# Config for Dependabot updates. See Documentation here:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Update GitHub actions in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    # Every weekday
    schedule:
      interval: 'daily'
    groups:
      github-actions:
        patterns:
          - '*'

  # Enable version updates for Python using uv
  - package-ecosystem: 'uv'
    # Look for pyproject.toml in the root directory
    directory: '/'
    # Every weekday
    schedule:
      interval: 'daily'
    groups:
      python:
        update-types:
          - 'minor'
          - 'patch'

  # Keep Docker base images fresh. The Dockerfiles pin their base images by
  # digest for reproducible, tamper-evident builds (OSSF Scorecard
  # Pinned-Dependencies). A pinned digest never receives upstream security
  # patches on its own, so Dependabot bumps the digest (and its tag) together —
  # that is what keeps us BOTH pinned AND patched, the same arrangement we use
  # for the SHA-pinned GitHub Actions above.
  - package-ecosystem: 'docker'
    directories:
      - '/compose/local/django'
      - '/compose/production/django'
      - '/compose/production/mcp'
      - '/compose/production/postgres'
    schedule:
      interval: 'daily'
    groups:
      docker:
        patterns:
          - '*'
