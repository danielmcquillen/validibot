name: CI

permissions:
  contents: read

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: ['master', 'main']
    paths-ignore: ['docs/**']

  push:
    branches: ['master', 'main']
    paths-ignore: ['docs/**']

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version-file: '.python-version'
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version-file: '.python-version'

      - name: Install type-check dependencies
        run: uv sync --group dev --frozen

      - name: Enforce mypy baseline
        run: uv run python scripts/check_mypy_baseline.py

  # With no caching at all the entire ci process takes 3m to complete!
  pytest:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:6
        ports:
          - 6379:6379
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: postgres

    env:
      REDIS_URL: 'redis://localhost:6379/0'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: postgres
      # ``manage.py`` defaults to config.settings.local (see manage.py), which
      # hard-requires these two secrets at import time. The migrate /
      # makemigrations steps below run with no settings override, so without
      # these the job dies before it can check migrations. The pytest step
      # overrides the settings module via --ds=config.settings.test (pyproject)
      # and the deploy-check step sets its own env, so neither is affected.
      # Both values are throwaway CI-only fakes (the Fernet key matches the
      # public test default in config/settings/test.py).
      DJANGO_SECRET_KEY: fake-key-for-ci-only
      DJANGO_MFA_ENCRYPTION_KEY: qYy0eDvn7TRiLVXGJk1XeXgvr1SYathyVc9X-7HIV5E=

    steps:
      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}" >> "$GITHUB_ENV"

      - name: Checkout Code Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Checkout SHACL validator backend
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          repository: danielmcquillen/validibot-validator-backends
          ref: 3b4ef068f15e7035f734a78dcf66a8d3a7f93da0  # v0.14.0
          path: .ci/validibot-validator-backends
          persist-credentials: false

      - name: Build SHACL validator backend
        run: |
          docker build \
            --file .ci/validibot-validator-backends/validator_backends/shacl/Dockerfile \
            --tag validibot-validator-backend-shacl:latest \
            .ci/validibot-validator-backends

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9  # v9.0.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version-file: '.python-version'

      - name: Install Dependencies
        # --extra docker-runner pulls in the docker SDK (already pinned in
        # uv.lock, so --frozen still resolves). The trust-tier runner tests
        # patch docker.from_env, which requires the module to be importable;
        # without the extra they error with ModuleNotFoundError: docker.
        run: uv sync --group dev --extra docker-runner --frozen

      - name: Audit dependencies
        run: uvx pip-audit

      - name: Check DB Migrations
        run: uv run python manage.py makemigrations --check

      - name: Check Migration History Compatibility
        run: uv run python manage.py check_migration_history

      - name: Run DB Migrations
        run: uv run python manage.py migrate

      - name: Test with pytest
        run: uv run pytest

      - name: Django deployment checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          DJANGO_SECRET_KEY: fake-key-for-ci-only
          # Production requires a separate HMAC key for API-key digests. Keep
          # this throwaway CI value distinct from DJANGO_SECRET_KEY so the
          # deployment check exercises the same separation required at runtime.
          DJANGO_API_KEY_DIGEST_KEY: fake-api-key-digest-key-for-ci-only
          DJANGO_ALLOWED_HOSTS: localhost
          DEPLOYMENT_TARGET: self_hosted
          EMAIL_HOST: localhost
          # self_hosted/aws targets fail-fast at settings import unless
          # WORKER_API_KEY is set — it's the only auth on the worker-only
          # endpoints (see config/settings/production.py). A throwaway CI-only
          # value satisfies the boot check; nothing here actually serves traffic.
          WORKER_API_KEY: fake-worker-key-for-ci-only
        run: uv run python manage.py check --deploy

  # Guarantees the committed front-end bundle is a fresh, minified production
  # build. Production ships the *committed* assets verbatim: the Docker image
  # has no Node toolchain and never rebuilds them, and collectstatic only
  # hashes/compresses whatever is checked in. So a stale or unminified bundle
  # (e.g. an accidental `npm run watch` build, or forgetting to rebuild after
  # editing a .ts/.scss file) would silently go live. This job rebuilds with
  # the lockfile-pinned toolchain (esbuild --minify --sourcemap, sass
  # --style=compressed) and fails if the result differs from what's committed.
  frontend-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '22'
          cache: npm

      # npm ci installs the exact versions from package-lock.json, so the build
      # is deterministic and CI matches what a developer who ran `npm ci` locally
      # produces — that byte-for-byte reproducibility is what makes the drift
      # check below meaningful.
      - name: Install pinned dependencies
        run: npm ci

      - name: Build CSS + JS bundles
        run: npm run build

      - name: Fail if the committed bundle is out of date
        run: |
          changes="$(git status --porcelain -- validibot/static/css validibot/static/js)"
          if [ -n "$changes" ]; then
            echo "::error::Committed front-end bundle is stale. Run 'npm run build' and commit validibot/static/{css,js}."
            echo "$changes"
            git --no-pager diff -- validibot/static/css validibot/static/js | head -n 200
            exit 1
          fi
          echo "Committed front-end bundle matches a fresh production build."

  # Runs the front-end unit suite (Vitest + jsdom) against the TypeScript source
  # in validibot/static/src/ts. Kept as its own job — separate from
  # frontend-assets — so a red check is unambiguous: a failure here means a unit
  # test broke, not that the committed bundle drifted. Vitest transforms the TS
  # in-memory via its own esbuild and writes nothing to static/{css,js}, so it
  # cannot contaminate the frontend-assets drift check. It runs in parallel with
  # the other jobs and needs no build step, since the tests import TS source
  # directly rather than the compiled bundle.
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: '22'
          cache: npm

      # npm ci installs the exact lockfile-pinned vitest/jsdom — the same
      # versions a developer runs locally — so the suite is deterministic.
      - name: Install pinned dependencies
        run: npm ci

      # `npm test` resolves to `vitest run` (the one-shot, non-watch command):
      # it executes the suite once and exits non-zero on failure, so it never
      # hangs CI in watch mode. `--passWithNoTests=false` makes "found no test
      # files" a hard failure, so a broken glob or an uncommitted test file
      # turns the check red instead of letting it pass on zero tests.
      - name: Run front-end unit tests
        run: npm test -- --passWithNoTests=false
