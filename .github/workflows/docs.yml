name: Docs

# The main CI workflow ignores docs/** entirely (paths-ignore), so docs
# changes get their own fast guard here instead. Two checks:
#
#   1. scripts/check_doc_links.py — every relative markdown link must
#      resolve to a real file (the June 2026 docs audit found links to
#      files that had been renamed or never existed).
#   2. zensical build — the dev-docs site must build cleanly with the
#      exact pinned version used for publishing, so a bad mkdocs.dev.yml
#      or nav entry can't land and break the next docs-sync.

permissions:
  contents: read

on:
  pull_request:
    branches: ['master', 'main']
    paths:
      - 'docs/**'
      - '*.md'
      - 'mkdocs*.yml'
      - 'scripts/check_doc_links.py'
      - '.github/workflows/docs.yml'
  push:
    branches: ['master', 'main']
    paths:
      - 'docs/**'
      - '*.md'
      - 'mkdocs*.yml'
      - 'scripts/check_doc_links.py'
      - '.github/workflows/docs.yml'

concurrency:
  group: docs-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: '.python-version'

      - name: Check relative links in markdown docs
        run: python scripts/check_doc_links.py

      # Install zensical from a fully hash-pinned requirements file so the
      # docs build is reproducible and tamper-evident (OSSF Scorecard
      # Pinned-Dependencies). The version must stay in sync with the zensical
      # pin in pyproject.toml — publishing uses that version, so CI proves the
      # same one builds. To bump: edit requirements/docs.in and regenerate
      # requirements/docs.txt (command in that file's header).
      - name: Build dev docs site
        run: |
          pip install --require-hashes -r requirements/docs.txt
          zensical build -f mkdocs.dev.yml --clean
