exclude: '^docs/|/migrations/|devcontainer.json'
default_stages: [pre-commit]
minimum_pre_commit_version: "3.2.0"

default_language_version:
  python: python3.13

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
        exclude: '^\.vscode/'
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key
        # Exclude files that legitimately contain PEM-header substrings
        # for pattern-matching purposes. The support-bundle redaction
        # module declares a regex that *matches* private-key headers in
        # operator settings (defense-in-depth so an unexpectedly-named
        # setting holding a PEM key still gets [REDACTED]). Its tests
        # construct synthetic PEM-shaped strings to exercise the regex.
        # Neither file ever contains real key material.
        exclude: |
          (?x)^(
              validibot/core/support_bundle\.py|
              validibot/core/tests/test_support_bundle\.py
          )$

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.93.3
    hooks:
      - id: trufflehog

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.25.0'
    hooks:
      - id: django-upgrade
        args: ['--target-version', '5.0']

  # Run the Ruff linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      # Linter
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format

  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-reformat-django
        exclude: users/widgets
      - id: djlint-django
        exclude: users/widgets

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
