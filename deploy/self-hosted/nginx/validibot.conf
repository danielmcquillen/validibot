# Validibot nginx reverse proxy template
#
# This is an EXAMPLE for operators who already run nginx and prefer it
# to the bundled Caddy profile. Validibot does NOT ship an nginx
# Compose service — Caddy is the only bundled proxy (off by default,
# enabled with COMPOSE_PROFILES=caddy). See ADR-2026-04-27 sections 5
# and 21 for the rationale.
#
# Drop a copy of this file into your existing nginx configuration
# directory (e.g. /etc/nginx/sites-available/validibot.conf), edit
# the placeholders below, then enable it:
#
#   sudo ln -s /etc/nginx/sites-available/validibot.conf \
#              /etc/nginx/sites-enabled/validibot.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# Assumed prerequisites:
#   - validibot stack is running with `web` published on 127.0.0.1:8000
#     (the default in docker-compose.production.yml);
#   - you have already obtained a TLS certificate via certbot or
#     equivalent and the cert paths below match what's on disk;
#   - your DJANGO_CSRF_TRUSTED_ORIGINS in
#     .envs/.production/.self-hosted/.django includes
#     https://validibot.example.com.

# Redirect plain HTTP to HTTPS. Operators behind a TLS-terminating
# load balancer (e.g. AWS ALB, Cloudflare) can drop this server
# block and adjust the proxy block below to listen on plain HTTP.
server {
    listen 80;
    listen [::]:80;
    server_name validibot.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name validibot.example.com;

    # TLS — adjust paths to match your certbot / acme.sh layout.
    ssl_certificate     /etc/letsencrypt/live/validibot.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/validibot.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Defense-in-depth headers. Django sets equivalents at the app
    # layer; nginx is the outer envelope.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Validibot uploads building energy models, IFC files, and FMUs.
    # The Django LimitedFileUploadHandler applies its own per-field
    # quota; nginx just needs to allow the request through.
    client_max_body_size 200m;

    # Logs — adjust to your aggregation pipeline.
    access_log /var/log/nginx/validibot.access.log;
    error_log  /var/log/nginx/validibot.error.log;

    location / {
        # Validibot's web container binds to 8000 inside the Compose
        # network; the host publishes it on 127.0.0.1:8000 so this
        # nginx (on the host) can reach it.
        proxy_pass http://127.0.0.1:8000;

        # Pass the original client IP through for audit logs and
        # rate limiting. DJANGO_SECURE_PROXY_SSL_HEADER must be set
        # to ('HTTP_X_FORWARDED_PROTO', 'https') in production.py.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Validation runs can stream progress over SSE; long-poll
        # timeouts must be generous. Tune downward if you don't use
        # streaming endpoints.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check endpoint Validibot exposes for liveness probes.
    location = /health/ {
        proxy_pass http://127.0.0.1:8000/health/;
        access_log off;
    }
}
