# Validibot self-hosted Compose stack
#
# This compose file runs Validibot in a customer-operated single-VM
# deployment using Docker Compose — typically on DigitalOcean, AWS EC2,
# Hetzner, or on-prem. See ADR-2026-04-27 (Boring Self-Hosting and
# Operator Experience) for the full operator experience.
#
# Usage:
#   1. Copy .envs.example/.production/.self-hosted/.django to .envs/.production/.self-hosted/.django
#   2. Copy .envs.example/.production/.self-hosted/.postgres to .envs/.production/.self-hosted/.postgres
#   3. Edit the env files with your configuration
#   4. First install: just self-hosted bootstrap
#   5. Later updates: just self-hosted deploy
#
# For SSL/HTTPS, place this behind a reverse proxy. The Compose stack
# includes an opt-in Caddy service via the ``caddy`` profile (off by
# default — see the caddy service below). If you already run nginx,
# Traefik, Cloudflare Tunnel, or your hosting provider's load balancer,
# leave the caddy profile off and wire your existing proxy to the
# ``web`` service on port 8000.
#
# To enable bundled Caddy (auto-TLS via Let's Encrypt):
#
#   COMPOSE_PROFILES=caddy just self-hosted deploy
#
# Architecture:
#   - web: Main web application (Gunicorn)
#   - worker: Background task processor (Celery worker)
#   - scheduler: Periodic task scheduler (Celery Beat)
#   - postgres: Database
#   - redis: Task queue broker
#   - caddy: (profile: caddy) optional reverse proxy with auto-TLS
#   - mcp: (profile: mcp) optional FastMCP server (Pro feature)
#
# Advanced validators run as sibling containers via Docker socket.

volumes:
  validibot_storage:      # Persistent file storage (public + private files)
  validibot_postgres_data:
  validibot_postgres_backups:
  validibot_redis_data:
  caddy_data:             # Caddy's auto-issued TLS certs (used only when the caddy profile is on)
  caddy_config:           # Caddy's runtime config

networks:
  validibot:
    driver: bridge

services:
  web: &django
    build:
      context: .
      dockerfile: compose/production/django/Dockerfile
      args:
        VALIDIBOT_COMMERCIAL_PACKAGE: ${VALIDIBOT_COMMERCIAL_PACKAGE:-}
        VALIDIBOT_PRIVATE_INDEX_URL: ${VALIDIBOT_PRIVATE_INDEX_URL:-}
        VALIDIBOT_VERSION: ${VALIDIBOT_VERSION:-}
        VALIDIBOT_REVISION: ${VALIDIBOT_REVISION:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - validibot
    volumes:
      # Persistent storage for files
      - validibot_storage:/app/storage
      - ./.envs/.production/.self-hosted/keys:/run/validibot-keys:ro
    env_file:
      - .envs/.production/.self-hosted/.django
      - .envs/.production/.self-hosted/.postgres
    environment:
      # Defaults to community production settings. Self-hosted Pro
      # operators override this to config.settings.production_pro in
      # their .envs/.production/.self-hosted/.django to activate
      # the Pro app + license.
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      # Configure advanced validator runner for the self-hosted stack
      - VALIDATOR_RUNNER=docker
      # Advanced validators run with no network by default (most secure)
      # Uncomment to enable network access if validators need external URLs:
      # - VALIDATOR_NETWORK=validibot_validibot
      - VALIDATOR_STORAGE_VOLUME=validibot_validibot_storage
      - VALIDATOR_STORAGE_MOUNT_PATH=/app/storage
      - DATA_STORAGE_ROOT=/app/storage/private
    ports:
      - "8000:8000"
    command: /start
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    # Background task processor (validation execution, etc.)
    # For self-hosted: Celery worker pulling from Redis
    <<: *django
    depends_on:
      web:
        condition: service_healthy
    ports: []
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=1"]
    volumes:
      - validibot_storage:/app/storage
      - ./.envs/.production/.self-hosted/keys:/run/validibot-keys:ro
      # Only the worker needs Docker socket access to spawn validator containers.
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .envs/.production/.self-hosted/.django
      - .envs/.production/.self-hosted/.postgres
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - APP_ROLE=worker
      - VALIDATOR_RUNNER=docker
      # Advanced validators run with no network by default (most secure)
      # Uncomment to enable network access if validators need external URLs:
      # - VALIDATOR_NETWORK=validibot_validibot
      - VALIDATOR_STORAGE_VOLUME=validibot_validibot_storage
      - VALIDATOR_STORAGE_MOUNT_PATH=/app/storage
      - DATA_STORAGE_ROOT=/app/storage/private
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    # Periodic task scheduler (cleanup, maintenance tasks)
    # Only run ONE scheduler instance to avoid duplicate task execution
    <<: *django
    depends_on:
      web:
        condition: service_healthy
      worker:
        condition: service_started
    ports: []
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    env_file:
      - .envs/.production/.self-hosted/.django
      - .envs/.production/.self-hosted/.postgres
    environment:
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE:-config.settings.production}
      - APP_ROLE=scheduler
    # Note: Only run ONE scheduler instance to avoid duplicate task execution.
    # If scaling horizontally, use external orchestration (Kubernetes, Swarm)
    # to ensure exactly one replica.
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    build:
      context: .
      dockerfile: compose/production/postgres/Dockerfile
    networks:
      - validibot
    env_file:
      - .envs/.production/.self-hosted/.postgres
    volumes:
      - validibot_postgres_data:/var/lib/postgresql/data
      - validibot_postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-validibot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - validibot
    command: redis-server --appendonly yes
    volumes:
      - validibot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    # Optional reverse proxy with automatic Let's Encrypt TLS.
    #
    # Off by default — most operators already run a reverse proxy
    # (nginx, Traefik, Cloudflare Tunnel, hosting-provider load
    # balancer). Enable only if you need a bundled TLS terminator.
    #
    # To enable:
    #   COMPOSE_PROFILES=caddy just self-hosted deploy
    #
    # Caddy auto-issues a Let's Encrypt cert for the hostname declared
    # in deploy/self-hosted/caddy/Caddyfile. That hostname must
    # already resolve to this host's public IP (run
    # ./deploy/self-hosted/scripts/check-dns to verify before first
    # boot). See ADR-2026-04-27 section 21 for the rationale behind
    # off-by-default + opt-in.
    profiles: ["caddy"]
    image: caddy:2-alpine
    depends_on:
      web:
        condition: service_healthy
    networks:
      - validibot
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/self-hosted/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # The Caddyfile reads SITE_URL to know which hostname to terminate
      # TLS for. Pulled from the same .django env file as the rest of
      # the stack.
      - SITE_URL=${SITE_URL:-}
    env_file:
      - .envs/.production/.self-hosted/.django
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mcp:
    # Validibot MCP server — exposes validation workflows to AI agents.
    #
    # Opt-in via the ``mcp`` Compose profile (set ENABLE_MCP_SERVER=true and
    # `just self-hosted up` will enable it). MCP is a Pro feature: the
    # server boots only if the deployment's license advertises the
    # ``mcp_server`` feature, so self-hosted users without validibot-pro
    # will see the container fail its startup license check even if the
    # profile is active.
    #
    # The MCP package lives in ``mcp/`` alongside this compose file. It is
    # a sibling Python project with no Django imports.
    profiles: ["mcp"]
    build:
      context: ./mcp
      dockerfile: ../compose/production/mcp/Dockerfile
    depends_on:
      web:
        condition: service_healthy
    networks:
      - validibot
    env_file:
      - .envs/.production/.self-hosted/.mcp
    ports:
      - "8001:8080"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'uvicorn' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
