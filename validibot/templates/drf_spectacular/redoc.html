{% extends "drf_spectacular/redoc.html" %}

{% block head %}
  <title>{{ title|default:"Redoc" }}</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Roboto:wght@300;400;700&display=swap" />
  <style nonce="{{ request.csp_nonce }}">
    body {
      margin: 0;
      padding: 0;
    }
  </style>
{% endblock head %}

{% block body %}
  {% if settings %}
    <div id="redoc-container">
    </div>

    <script src="{{ redoc_standalone }}" nonce="{{ request.csp_nonce }}"></script>

    <script nonce="{{ request.csp_nonce }}">
      // 1. Parse Django's default configuration settings
      const baseSettings = {
        {
          settings | safe
        }
      };

      // 2. Inject the CSP nonce directly into Redoc's configuration object
      const redocSettings = {
        ...baseSettings,
        nonce: "{{ request.csp_nonce }}"
      };

      Redoc.init("{{ schema_url }}", redocSettings, document.getElementById('redoc-container'));
    </script>
  {% else %}
    <div id="redoc-container">
    </div>
    <script src="{{ redoc_standalone }}" nonce="{{ request.csp_nonce }}"></script>
    <script nonce="{{ request.csp_nonce }}">
      Redoc.init("{{ schema_url }}", {
        nonce: "{{ request.csp_nonce }}"
      }, document.getElementById('redoc-container'));
    </script>
  {% endif %}
{% endblock body %}
