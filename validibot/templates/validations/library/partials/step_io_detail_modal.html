{% load i18n %}

<div class="modal fade"
     id="modal-step-io-detail-{{ entry_id }}"
     tabindex="-1"
     aria-labelledby="modalStepIODetailLabel-{{ entry_id }}"
     aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalStepIODetailLabel-{{ entry_id }}">
          {% trans "Input/Output Details" %}
        </h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="{% trans 'Close' %}">
        </button>
      </div>
      <div class="modal-body">
        {% include "validations/library/partials/step_io_detail_content.html" with io_definition=io_definition %}
      </div>
      <div class="modal-footer">
        <button type="button"
                class="btn btn-light action-button"
                data-bs-dismiss="modal">
          {% trans "Close" %}
        </button>
      </div>
    </div>
  </div>
</div>
