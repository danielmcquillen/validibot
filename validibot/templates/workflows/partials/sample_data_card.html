{% load i18n %}

<div class="card shadow-sm flex-grow-1 d-flex flex-column">
  <div class="card-header">
    <h6 class="mb-0">
      <i class="bi bi-lightning me-1"></i>{% trans "Paste Sample Data" %}
    </h6>
  </div>
  <div class="card-body d-flex flex-column overflow-hidden">
    <p class="text-muted small mb-2">
      {% trans "Paste JSON, XML, or a JSON Schema to auto-discover candidate signals." %}
    </p>
    <form hx-post="{% url 'workflows:workflow_signal_mapping_sample_data' pk=workflow.pk %}"
          hx-target="#sample-data-results"
          hx-swap="innerHTML"
          hx-indicator="#sample-data-indicator"
          hx-disabled-elt="find button[type='submit']"
          id="sample-data-form">
      {% csrf_token %}
      <textarea name="sample_data"
                class="form-control font-monospace"
                rows="8"
                placeholder='{% trans "Paste JSON, XML, or a JSON Schema here..." %}'></textarea>
      <button type="submit" class="btn btn-secondary btn-sm mt-2">
        <i class="bi bi-search me-1"></i>{% trans "Parse" %}
      </button>
      <span id="sample-data-indicator" class="htmx-indicator ms-2">
        <span class="spinner-border spinner-border-sm" role="status"></span>
      </span>
    </form>
    <div id="sample-data-results"
         class="mt-3 d-flex flex-column flex-grow-1 overflow-hidden"
         style="min-height: 400px">
    </div>
  </div>
</div>
